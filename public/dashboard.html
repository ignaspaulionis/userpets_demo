<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Info</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f8f9fa;
    }

    .top-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
      position: sticky;
      top: 0;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .nav-link {
      color: #1f2937;
      text-decoration: none;
      font-weight: 600;
      padding: 6px 10px;
      border-radius: 6px;
    }

    .nav-link:hover {
      background: #f3f4f6;
    }

    .nav-link.active {
      background: #e5edff;
      color: #1d4ed8;
    }

    .logout-btn {
      border: 1px solid #d1d5db;
      background: #ffffff;
      color: #111827;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }

    .logout-btn:hover {
      background: #f3f4f6;
    }

    .auth-status {
      font-size: 13px;
      color: #4b5563;
    }

    .container {
      margin: 50px 20px 20px;
      text-align: center;
    }

    .info {
      font-size: 20px;
      margin-top: 20px;
    }

    .refresh-time {
      margin-top: 20px;
      color: gray;
    }
  </style>
</head>
<body>
  <nav class="top-nav">
    <div class="nav-links">
      <a href="/dashboard.html" class="nav-link active">Dashboard</a>
      <a href="/api-docs" class="nav-link">API Docs</a>
      <button id="logout-btn" class="logout-btn" type="button">Logout</button>
    </div>
    <div id="auth-status" class="auth-status">Checking token status...</div>
  </nav>

  <div class="container">
    <h1>User Information</h1>
    <div id="user-info" class="info">Loading...</div>
    <div class="refresh-time">
      <small>Refreshing every 5 seconds...</small>
    </div>
  </div>

  <script>
    function updateAuthStatus() {
      const token = localStorage.getItem('token');
      const authStatus = document.getElementById('auth-status');
      authStatus.textContent = token ? 'Token status: Present' : 'Token status: Missing';
    }

    function logout() {
      localStorage.removeItem('token');
      updateAuthStatus();
      window.location.href = '/dashboard.html';
    }

    // Function to fetch the user information
    async function fetchUserInfo() {
      const token = localStorage.getItem('token');
      try {
        const response = await fetch('/users/user-stats', {
          method: 'GET',
          headers: {
            'Authorization': `Bearer ${token}` // Assuming JWT is stored in localStorage
          }
        });

        if (!response.ok) {
          throw new Error('Failed to fetch user info');
        }

        const users = await response.json(); // This is an array of users
        const userInfoDiv = document.getElementById('user-info');

        // Clear the div before adding new content
        userInfoDiv.innerHTML = '';

        // Check if users exist and loop through them
        if (users && users.length > 0) {
          users.forEach(user => {
            const userElement = document.createElement('div');
            userElement.innerHTML = `
              <strong>Email:</strong> ${user.email} <br>
              <strong>Superadmin:</strong> ${user.issuperadmin} <br><br>
            `;
            userInfoDiv.appendChild(userElement);
          });
        } else {
          userInfoDiv.innerHTML = 'User not found.';
        }

      } catch (error) {
        document.getElementById('user-info').innerText = token
          ? 'Error fetching user info'
          : 'No token found. Please login to view user info.';
        console.error('Error fetching user info:', error);
      }
    }

    document.getElementById('logout-btn').addEventListener('click', logout);

    // Refresh the page content every 5 seconds
    setInterval(fetchUserInfo, 5000);

    // Fetch the user info when the page loads
    updateAuthStatus();
    fetchUserInfo();
  </script>
</body>
</html>
